name: Nightly Test Pyramid

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-pyramid:
    name: Nightly unit, integration, and E2E pyramid
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      VITE_STADIA_API_KEY: test-key-for-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup repo
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full pyramid
        run: npm run test:pyramid

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-playwright-report
          path: tests/results/reports/html
          retention-days: 7
