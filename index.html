<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="European town populations 800–1750 on an interactive map. Compare centuries with a timeline; marker size shows population."
    />
    <meta
      name="keywords"
      content="historical map, population data, medieval towns, European history, interactive visualization"
    />
    <meta name="author" content="a-a-m-k" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="European towns, 800–1750" />
    <meta
      property="og:description"
      content="European town populations 800–1750. Timeline, map markers by population, responsive."
    />
    <meta property="og:url" content="https://a-a-m-k.github.io/historical-europe-map/" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:title"
      content="European towns, 800–1750"
    />
    <meta
      property="twitter:description"
      content="European town populations 800–1750. Timeline, map markers by population."
    />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    
    <!-- Resource Hints: Preconnect to external domains -->
    <link rel="dns-prefetch" href="https://tiles.stadiamaps.com" />
    <link rel="dns-prefetch" href="https://api.stadiamaps.com" />
    <link rel="preconnect" href="https://tiles.stadiamaps.com" crossorigin />
    <link rel="preconnect" href="https://api.stadiamaps.com" crossorigin />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1976d2" />

    <!-- Content Security Policy (meta: GitHub Pages cannot send CSP headers; use a CDN in front if you need header-based CSP) -->
    <!--
      Dev: script-src includes 'unsafe-inline' so Vite HMR / dev overlay work.
      Production build: vite-plugin-production-html-csp-cleanup strips async-CSS
      onload handlers and removes script 'unsafe-inline' (not needed for module scripts only).
      style-src 'unsafe-inline' remains for MUI Emotion + inlined critical CSS.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' https://tiles.stadiamaps.com data:; img-src 'self' data: blob: https://tiles.stadiamaps.com https://*.stadiamaps.com https://stadiamaps.com; connect-src 'self' https://tiles.stadiamaps.com https://*.stadiamaps.com https://stadiamaps.com; worker-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests;"
    />

    <title>European towns, 800–1750</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
